<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notion Date Widget</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#191919;
    --text:#FFFFFF;
}

html,
body{
    width:100%;
    height:100%;
}

body{
    background:var(--bg);
    color:var(--text);

    font-family:Helvetica, Arial, sans-serif;

    display:flex;
    align-items:center;
    justify-content:center;

    overflow:hidden;
}

.container{

    width:100%;
    height:100%;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:20px 24px;

}

#weekday,
#date{

    font-size:26px;
    font-weight:700;
    letter-spacing:.5px;
    text-transform:uppercase;

    white-space:nowrap;

    text-shadow:
        0px 1px 2px rgba(0,0,0,.45);

}

</style>

</head>

<body>

<div class="container">

    <div id="weekday"></div>

    <div id="date"></div>

</div>

<script>

function updateDate(){

    const now = new Date();

    const weekdays = [
        "Sunday",
        "Monday",
        "Tuesday",
        "Wednesday",
        "Thursday",
        "Friday",
        "Saturday"
    ];

    const months = [
        "January",
        "February",
        "March",
        "April",
        "May",
        "June",
        "July",
        "August",
        "September",
        "October",
        "November",
        "December"
    ];

    document.getElementById("weekday").textContent =
        weekdays[now.getDay()].toUpperCase();

    document.getElementById("date").textContent =
        months[now.getMonth()].toUpperCase() + " " + now.getDate();

}

updateDate();

setInterval(updateDate,60000);

</script>

</body>
</html>
